services:
  # Backend Express/Node.js service
  - type: web
    name: aimart-backend
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: ML_SERVICE_URL
        fromService:
          name: aimart-ml-service
          type: web
          property: host

  # ML Service FastAPI/Python service
  - type: web
    name: aimart-ml-service
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
